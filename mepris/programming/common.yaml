steps:
  - id: install-npm
    packages: ["nodejs-lts", "npm"]

  - id: npm-config-user
    os: "!windows"
    script: |
      mkdir ~/.npm-global
      npm config set prefix '~/.npm-global'

  - id: install-language-servers-npm
    packages: ["yaml-language-server"]
    package_source: npm

  - id: install-ai-agent
    packages: ["opencode-ai"]
    package_source: npm

  - id: install-dbeaver
    packages: ["dbeaver"]

  - id: fix-dbeaver-arch
    os: "%arch"
    script: sudo archlinux-java set java-21-openjdk

  - id: install-vscode
    packages: ["vscode"]

  - id: activate-jetbrains-linux
    os: "linux"
    env: ["JETBRAINS_ARCHIVE_URL", "FILE_ACCESS_USER", "FILE_ACCESS_PASSWORD"]
    packages: ["7zip"]
    script: |
      set -e
      ARCHIVE="jetbrains"
      curl -L -f -u "$FILE_ACCESS_USER:$FILE_ACCESS_PASSWORD" -o "$ARCHIVE" "$JETBRAINS_ARCHIVE_URL"
      7z x -y "$ARCHIVE"
      rm "$ARCHIVE"
      chmod +x ./jetbra/scripts/install.sh
      ./jetbra/scripts/install.sh

  - id: install-docker-arch
    os: "%arch"
    packages: ["docker", "docker-compose"]

  - id: run-docker-linux
    os: "linux"
    script: |
      sudo systemctl enable --now docker.service
      sudo usermod -aG docker $USER

  - id: install-minikube
    os: "linux"
    packages: ["kubectl", "minikube"]
    script: minikube start --driver=docker
