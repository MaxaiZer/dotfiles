steps:
  - id: terminal-core
    tags: ["terminal"]
    packages:
      ["gcc", "fd", "ripgrep", "sed", "neovim", "lazygit", "zoxide", "starship"]

  - id: neovim-linux-helpers
    os: "linux"
    tags: ["terminal"]
    packages: ["wl-clipboard"]

  - id: fzf
    os: "!%debian"
    tags: ["terminal"]
    packages: ["fzf"]

  - id: fzf-debian
    os: "%debian"
    tags: ["terminal"]
    script: |
      git clone --depth 1 https://github.com/junegunn/fzf.git ~/.fzf
      ~/.fzf/install --key-bindings --completion --no-update-rc

  - id: windows-powershell
    os: "windows"
    tags: ["terminal"]
    packages: ["pwsh"]
    script: |
      Install-Module -Name posh-git -Scope CurrentUser -Force
      Install-Module -Name PSFzf -Scope CurrentUser -Force
    check: |
      $modules = @("posh-git", "PSFzf")
      foreach ($m in $modules) {
          if (-not (Get-Module -ListAvailable -Name $m)) {
              exit 1
          }
      }
      exit 0

  - id: yazi
    os: "!%debian"
    tags: ["terminal"]
    packages: ["yazi"]

  - id: yazi-debian
    os: "%debian"
    tags: ["terminal"]
    when: |
      if command -v yazi >/dev/null 2>&1; then exit 1; else exit 0; fi
    script: |
      wget -qO yazi.zip https://github.com/sxyazi/yazi/releases/latest/download/yazi-x86_64-unknown-linux-gnu.zip
      unzip -q yazi.zip -d yazi-temp
      sudo mv yazi-temp/*/{ya,yazi} /usr/local/bin
      rm -rf yazi-temp yazi.zip

  - id: stow
    os: "!windows"
    tags: ["terminal", "stow"]
    packages: ["git", "stow"]
    script: |
      set -e
      [ ! -d ~/dotfiles ] && git clone https://github.com/MaxaiZer/dotfiles ~/dotfiles
      cd ~/dotfiles
      stow nvim
      stow yazi
      sudo mkdir -p /usr/share/backgrounds
      for img in ~/dotfiles/backgrounds/*; do
        sudo ln -sf "$img" /usr/share/backgrounds/
      done
    check: |
      [ -d ~/dotfiles ] && [ -L ~/.config/nvim ] && [ -L ~/.config/yazi ] && for img in ~/dotfiles/backgrounds/*;
      do [ -L "/usr/share/backgrounds/$(basename "$img")" ]; done || exit 1

  - id: stow-fish
    os: "!windows"
    tags: ["terminal", "stow"]
    packages: ["fish"]
    script: |
      set -e
      cd ~/dotfiles
      stow starship
      chmod +x ~/dotfiles/fish/setup.sh
      ~/dotfiles/fish/setup.sh
      mepris completion fish > ~/.config/fish/completions/mepris.fish
    check: |
      [ -L ~/.config/starship.toml ] && [ -f ~/.config/fish/completions/mepris.fish ] || exit 1

  - id: stow-konsole
    os: "!windows"
    tags: ["terminal", "stow"]
    when: |
      if command -v konsole >/dev/null 2>&1; then exit 0; else exit 1; fi
    script: |
      cd ~/dotfiles
      stow konsole
      sed -i "s/^DefaultProfile=.*/DefaultProfile=MyProfile.profile/" "$HOME/.config/konsolerc"
    check: |
      [ -L ~/.local/share/konsole/MyProfile.profile ] && grep -q "^DefaultProfile=MyProfile.profile" ~/.config/konsolerc || exit 1

  - id: stow-windows
    os: "windows"
    tags: ["terminal", "stow", "no-admin"]
    script: |
      git clone https://github.com/MaxaiZer/dotfiles "$HOME/dotfiles"

      #nvim
      $targetDir = "$env:LOCALAPPDATA\nvim"
      New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
      Copy-Item -Recurse -Force "$HOME\dotfiles\nvim\.config\nvim\*" $targetDir

      #yazi
      $targetDir = "$env:APPDATA\yazi\config"
      $targetPath = "$targetDir\yazi.toml"
      New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
      Copy-Item -Force "$HOME\dotfiles\yazi\.config\yazi\yazi.toml" $targetPath
      (Get-Content -Path $targetPath -Raw) -replace '\$@', '%1' | Set-Content -Path $targetPath -NoNewline

      #starship
      Copy-Item -Force "$HOME\dotfiles\starship\.config\starship.toml" "$HOME\.config\"

      #pwsh
      Set-Content -Path $PROFILE -Value (Get-Content "$HOME\dotfiles\pwsh\profile.ps1" -Raw)

      #mepris
      $completionsDir = Join-Path $HOME ".config/powershell/completions"
      $outputFile = Join-Path $completionsDir "mepris.ps1"
      New-Item -ItemType Directory -Force -Path $completionsDir | Out-Null
      mepris completion powershell | Out-File -FilePath $outputFile -Encoding utf8
    check: |
      # nvim
      $nvimPath = "$env:LOCALAPPDATA\nvim"
      if (-not (Test-Path $nvimPath -PathType Container)) {
          exit 1
      }

      # yazi
      $yaziPath = "$env:APPDATA\yazi\config\yazi.toml"
      if (-not ((Test-Path $yaziPath -PathType Leaf) -and ((Get-Item $yaziPath).Length -gt 0))) {
          exit 1
      }

      # starship
      $starshipPath = "$HOME\.config\starship.toml"
      if (-not ((Test-Path $starshipPath -PathType Leaf) -and ((Get-Item $starshipPath).Length -gt 0))) {
          exit 1
      }

      # pwsh
      if (-not ((Test-Path $PROFILE -PathType Leaf) -and ((Get-Item $PROFILE).Length -gt 0))) {
          exit 1
      }

      # mepris
      $meprisFile = Join-Path $HOME ".config/powershell/completions/mepris.ps1"
      if (-not ((Test-Path $meprisFile -PathType Leaf) -and ((Get-Item $meprisFile).Length -gt 0))) {
          exit 1
      }

  - id: nerd-fonts
    os: "!windows"
    tags: ["terminal", "fonts"]
    packages: ["jq", "unzip"]
    when: |
      if fc-list | grep -qi 'JetBrainsMono.*Nerd Font'; then exit 1; else exit 0; fi
    script: |
      chmod +x ~/dotfiles/install_nerd_fonts.sh
      ~/dotfiles/install_nerd_fonts.sh

  - id: nerd-fonts-windows
    os: "windows"
    tags: ["terminal", "fonts"]
    pre_script: scoop bucket add nerd-fonts
    packages: ["JetBrainsMono-NF"]
