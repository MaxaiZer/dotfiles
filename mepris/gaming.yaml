steps:
  - id: install-nvidia-pascal-drivers #for 10xx series
    os: "arch || endeavouros"
    when: |
      lspci | grep -i 'NVIDIA.*GP10' >/dev/null 2>&1
    packages:
      [
        "nvidia-580xx-dkms",
        "nvidia-580xx-utils",
        "lib32-nvidia-580xx-utils",
        "nvidia-580xx-settings",
        "opencl-nvidia-580xx"
      ]
    package_source: aur

  - id: install-nvidia-drivers
    os: "linux"
    when: |
      lspci | grep -i 'nvidia' >/dev/null 2>&1 && \
        ! lspci | grep -i 'NVIDIA.*GP10' >/dev/null 2>&1
    packages:
      [
        "nvidia-dkms",
        "nvidia-utils",
        "lib32-nvidia-utils",
        "nvidia-settings",
        "opencl-nvidia"
      ]

  - id: install-gaming-stuff #most packages are from cachyos-gaming-meta
    os: "linux"
    packages:
      [
        "steam",
        "lutris",
        "lib32-gamemode", "gamemode",
        "wine",
        "winetricks",
        "glfw",
        "lib32-vulkan-icd-loader", "vulkan-icd-loader",
        "lib32-alsa-plugins", "alsa-plugins",
        "lib32-ocl-icd", #provides lib32-opencl-icd-loader
        "lib32-openal", "openal",
        "lib32-mpg123", "mpg123",
        "lib32-libva", "libva",
        "lib32-libjpeg-turbo", "libjpeg-turbo",
        "lib32-giflib", "giflib",
        "lib32-gtk3",
        "gst-plugins-base-libs",
        "libxslt",
        "ttf-liberation",
        "mangohud",
        "vulkan-tools",
      ]
    script: winecfg && winetricks vcrun6sp6 #vcrun6sp6 to run some game installers

  - id: install-gaming-stuff-aur
    os: "%arch"
    packages:
      [
        "portproton",
        "faugus-launcher",
        "hydra-launcher-bin",
        "heroic-games-launcher-bin",
        "protontricks",
        "protonplus", #because protonup-qt doesn't support dw-proton
        "onlinefix-linux-launcher-bin",
      ]
    package_source: aur
    script: |
      WINEPREFIX=~/Faugus/default/pfx winetricks openal #to run Planescape Tornament
      WINEPREFIX=~/Faugus/default/pfx winetricks vcrun2015 #otherwise can be error like "can't open tmp/....png"
      xdg-mime default ru.linux_gaming.PortProton.desktop application/x-ms-dos-executable
